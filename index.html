<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEBUG MODE - TITAN X</title>
  </head>
  <body style="margin: 0; background-color: #020202;">
    <!-- 這是最後的保險：如果 React 沒跑，這行字一定會在大黑屏上出現 -->
    <div id="fallback-ui" style="position:fixed; top:10px; left:10px; color:white; font-size:10px; z-index:9999;">
      HTML_LOADED_V4
    </div>
    
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // 如果 5 秒後 root 還是空的，強制顯示錯誤
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.trim() === "") {
          root.innerHTML = '<div style="color:red; padding:50px; font-size:20px; text-align:center;">REACT_BOOT_FAILED: 腳本執行中斷</div>';
        }
      }, 5000);
    </script>
  </body>
</html>
